<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freinz Friendzy - Phone Ratings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { vivid: '#f97316', deep: '#a855f7', obsidian: '#050505' }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { background: #050505; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-glow:hover { box-shadow: 0 0 30px rgba(249,115,22,0.3); }
        .gradient-text { background: linear-gradient(135deg, #f97316, #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #f97316, #a855f7); }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; }
        input:focus, textarea:focus { outline: none; border-color: #f97316; }
        .star-filled { color: #f97316; }
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px); opacity: 0.15; pointer-events: none; }
        .login-btn { transition: all 0.2s; }
        .login-btn:active { transform: scale(0.98); }
        .login-google:hover { box-shadow: 0 0 25px rgba(66,133,244,0.5); border-color: #4285F4 !important; }
        .login-facebook:hover { box-shadow: 0 0 25px rgba(24,119,242,0.5); border-color: #1877F2 !important; }
        .login-apple:hover { box-shadow: 0 0 25px rgba(255,255,255,0.3); border-color: #fff !important; }
        .filter-rating.selected { background: linear-gradient(135deg, #f97316, #a855f7) !important; }
        .price-btn.selected { background: linear-gradient(135deg, #f97316, #a855f7) !important; }
        .sort-btn.selected { background: linear-gradient(135deg, #f97316, #a855f7) !important; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .float { animation: float 6s ease-in-out infinite; }
        .float-delay-1 { animation-delay: -2s; }
        .float-delay-2 { animation-delay: -4s; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="bg-glow top-0 left-0 -translate-x-1/2 -translate-y-1/2" style="background:#f97316;"></div>
    <div class="bg-glow bottom-0 right-0 translate-x-1/2 translate-y-1/2" style="background:#a855f7;"></div>

    <!-- Landing Page -->
    <div id="landingPage">
        <nav class="glass py-3 px-4 md:py-4 md:px-6 relative z-50">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl gradient-bg flex items-center justify-center">
                        <i class="fas fa-mobile-alt text-white"></i>
                    </div>
                    <span class="text-lg md:text-2xl font-bold gradient-text">Freinz Friendzy</span>
                </div>
                <div class="flex gap-2">
                    <button id="guestBtn" class="px-3 py-2 rounded-lg glass hover:bg-white/10 text-sm md:text-base">Guest</button>
                </div>
            </div>
        </nav>
        <main class="flex-1 flex items-center justify-center px-4 py-8 md:py-12 relative z-10">
            <div class="text-center max-w-2xl">
                <div class="flex justify-center gap-3 md:gap-4 mb-6 md:mb-8">
                    <i class="fas fa-mobile-alt text-4xl md:text-6xl gradient-text float"></i>
                    <i class="fas fa-star text-4xl md:text-6xl text-vivid float float-delay-1"></i>
                    <i class="fas fa-tablet-alt text-4xl md:text-6xl gradient-text float float-delay-2"></i>
                </div>
                <h1 class="text-4xl md:text-6xl font-bold mb-3 md:mb-4"><span class="gradient-text">Freinz Friendzy</span></h1>
                <p class="text-lg md:text-xl text-gray-300 mb-2">Your Phone Rating Platform</p>
                <p class="text-gray-400 mb-6 md:mb-8">Discover & rate the best smartphones</p>
                <div class="flex flex-col gap-3 md:gap-4 max-w-sm mx-auto">
                    <button id="loginGoogle" class="login-btn login-google w-full py-3 md:py-4 rounded-xl glass flex items-center justify-center gap-3 border border-transparent">
                        <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        <span class="font-semibold text-sm md:text-base">Google</span>
                    </button>
                    <button id="loginFacebook" class="login-btn login-facebook w-full py-3 md:py-4 rounded-xl flex items-center justify-center gap-3 border border-transparent" style="background:rgba(24,119,242,0.15);">
                        <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        <span class="font-semibold text-sm md:text-base">Facebook</span>
                    </button>
                    <button id="loginApple" class="login-btn login-apple w-full py-3 md:py-4 rounded-xl glass flex items-center justify-center gap-3 border border-transparent">
                        <i class="fab fa-apple text-lg md:text-xl"></i>
                        <span class="font-semibold text-sm md:text-base">Apple</span>
                    </button>
                </div>
            </div>
        </main>
        <div class="glass py-6 md:py-8 px-4 md:px-6 relative z-50">
            <div class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 text-center">
                <div><div class="w-12 h-12 rounded-full gradient-bg flex items-center justify-center mx-auto mb-2 md:mb-3"><i class="fas fa-search"></i></div><h3 class="font-bold text-sm md:text-base">Search</h3><p class="text-gray-400 text-xs md:text-sm">Find phones</p></div>
                <div><div class="w-12 h-12 rounded-full gradient-bg flex items-center justify-center mx-auto mb-2 md:mb-3"><i class="fas fa-filter"></i></div><h3 class="font-bold text-sm md:text-base">Filter</h3><p class="text-gray-400 text-xs md:text-sm">By rating/price</p></div>
                <div><div class="w-12 h-12 rounded-full gradient-bg flex items-center justify-center mx-auto mb-2 md:mb-3"><i class="fas fa-star"></i></div><h3 class="font-bold text-sm md:text-base">Rate</h3><p class="text-gray-400 text-xs md:text-sm">Community</p></div>
            </div>
        </div>
    </div>

    <!-- Catalog Page -->
    <div id="catalogPage" class="hidden">
        <nav class="glass sticky top-0 z-50 py-3 px-4 md:py-4 md:px-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl gradient-bg flex items-center justify-center">
                        <i class="fas fa-mobile-alt text-white"></i>
                    </div>
                    <span class="text-lg md:text-2xl font-bold gradient-text">Freinz Friendzy</span>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <button id="homeBtn" class="p-2 rounded-lg glass hover:bg-white/10"><i class="fas fa-home"></i></button>
                    <div id="userSection" class="hidden flex items-center gap-2">
                        <button id="profileBtn" class="flex items-center gap-2 p-2 rounded-lg glass hover:bg-white/10">
                            <img id="userAvatar" class="w-7 h-7 md:w-8 md:h-8 rounded-full" src="">
                            <span id="userName" class="text-xs md:text-sm font-medium hidden md:inline"></span>
                        </button>
                        <button id="logoutBtn" class="p-2 rounded-lg glass hover:bg-white/10" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    <button id="adminBtn" class="hidden px-3 md:px-4 py-2 rounded-xl gradient-bg text-xs md:text-sm">+ Add</button>
                </div>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-4 py-6 md:py-8">
            <h1 class="text-3xl md:text-5xl font-bold text-center mb-6 md:mb-8">Phone Catalog</h1>
            <div class="flex flex-col md:flex-row gap-3 md:gap-4 mb-6 md:mb-8">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm md:text-base"></i>
                    <input type="text" id="searchInput" placeholder="Search phones..." class="w-full pl-10 md:pl-12 pr-3 md:pr-4 py-2 md:py-3 rounded-xl text-sm md:text-base">
                </div>
                <button id="openFilterBtn" class="px-4 md:px-6 py-2 md:py-3 rounded-xl glass flex items-center justify-center gap-2 text-sm md:text-base">
                    <i class="fas fa-sliders-h"></i><span>Filter</span>
                    <span id="filterBadge" class="hidden w-5 h-5 rounded-full bg-vivid text-white text-xs flex items-center justify-center">0</span>
                </button>
            </div>
            <div id="phoneGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6"></div>
            <div id="emptyState" class="hidden text-center py-12 md:py-20">
                <i class="fas fa-mobile-alt text-5xl md:text-7xl text-gray-600 mb-4"></i>
                <p id="emptyMsg" class="text-gray-400 text-lg md:text-xl">No phones found</p>
            </div>
        </main>
        <footer class="glass py-6 mt-8 md:mt-12 text-center"><p class="text-gray-400 text-sm md:text-base">&copy; 2024 Freinz Friendzy</p></footer>
    </div>

<!-- Filter Modal -->
    <div id="filterModal" class="hidden fixed inset-0 z-50 flex items-center justify-end modal-overlay p-0">
        <div class="glass w-full max-w-md h-full overflow-y-auto">
            <div class="sticky top-0 glass p-4 flex justify-between items-center z-10">
                <h2 class="text-lg font-bold">Filter</h2>
                <button id="closeFilterModal" class="w-9 h-9 rounded-full glass hover:bg-white/10 flex items-center justify-center">×</button>
            </div>
            
            <div class="p-4 border-b border-gray-700">
                <h3 class="font-semibold mb-3 text-sm">Rating</h3>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-rating px-4 py-2 rounded-full glass text-sm hover:bg-white/10 selected" data-rating="5">
                        <span class="text-vivid">★</span> 5
                    </button>
                    <button class="filter-rating px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-rating="4">
                        <span class="text-vivid">★</span> 4+
                    </button>
                    <button class="filter-rating px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-rating="3">
                        <span class="text-vivid">★</span> 3+
                    </button>
                </div>
            </div>
            
            <div class="p-4 border-b border-gray-700">
                <h3 class="font-semibold mb-3 text-sm">Harga</h3>
                <div class="flex flex-wrap gap-2">
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="0" data-max="1000000">&lt; 1 JT</button>
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="1000000" data-max="2000000">1-2 JT</button>
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="2000000" data-max="3000000">2-3 JT</button>
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="3000000" data-max="5000000">3-5 JT</button>
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="5000000" data-max="10000000">5-10 JT</button>
                    <button class="price-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-min="10000000" data-max="999999999">&gt; 10 JT</button>
                </div>
            </div>
            
            <div class="p-4 border-b border-gray-700">
                <h3 class="font-semibold mb-3 text-sm">Kisaran Harga</h3>
                <div class="flex items-center gap-3">
                    <div class="flex-1">
                        <input type="number" id="filterMinPrice" placeholder="Min" class="w-full px-3 py-2 rounded-lg text-sm">
                    </div>
                    <span class="text-gray-400">-</span>
                    <div class="flex-1">
                        <input type="number" id="filterMaxPrice" placeholder="Max" class="w-full px-3 py-2 rounded-lg text-sm">
                    </div>
                </div>
            </div>
            
            <div class="p-4">
                <h3 class="font-semibold mb-3 text-sm">Urutkan</h3>
                <div class="flex flex-wrap gap-2">
                    <button class="sort-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10 selected" data-sort="termurah">Termurah</button>
                    <button class="sort-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-sort="termahal">Termahal</button>
                    <button class="sort-btn px-4 py-2 rounded-full glass text-sm hover:bg-white/10" data-sort="rating">Rating Tertinggi</button>
                </div>
            </div>
            
            <div class="sticky bottom-0 glass p-4 flex gap-3 z-10">
                <button id="resetFilter" class="flex-1 py-3 rounded-xl glass font-semibold text-sm">Reset</button>
                <button id="applyFilter" class="flex-1 py-3 rounded-xl gradient-bg font-semibold text-sm">Terapkan</button>
            </div>
</div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 md:bottom-6 right-4 md:right-6 z-50 glass px-5 md:px-6 py-3 md:py-4 rounded-xl text-sm md:text-base">
        <span id="toastMsg"></span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAk6RZ_epQdkl213qy-Dqdcim-ZDRe3Xbs",
            authDomain: "freinzfriendzyprojectadv.firebaseapp.com",
            projectId: "freinzfriendzyprojectadv",
            storageBucket: "freinzfriendzyprojectadv.firebasestorage.app",
            messagingSenderId: "953972561417",
            appId: "1:953972561417:web:2458d6790134a3b7878ad8"
        };

        const DEFAULT_PHONES = [
            { id:1, name:"iPhone 15 Pro Max", price:17999000, rating:4.8, image:"https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=400&h=400&fit=crop" },
            { id:2, name:"Samsung Galaxy S24 Ultra", price:19499000, rating:4.7, image:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=400&h=400&fit=crop" },
            { id:3, name:"Google Pixel 8 Pro", price:14999000, rating:4.6, image:"https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400&h=400&fit=crop" },
            { id:4, name:"OnePlus 12", price:11999000, rating:4.4, image:"https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=400&h=400&fit=crop" }
        ];

        const ADMIN_EMAILS = ['zennzgaming9@gmail.com'];
        let phones = JSON.parse(localStorage.getItem('freinzPhones')) || [...DEFAULT_PHONES];
        let userProfile = JSON.parse(localStorage.getItem('freinzUserProfile')) || {};
        let currentUser = null, isAdmin = false, base64Image = '', auth = null, authAvailable = false;

        try { firebase.initializeApp(firebaseConfig); auth = firebase.auth(); authAvailable = true; } catch(e) { console.error('Firebase init error:', e); }

        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const facebookProvider = new firebase.auth.FacebookAuthProvider();
        const appleProvider = new firebase.auth.OAuthProvider('apple.com');

        let activeFilters = { ratings:[], minPrice:null, maxPrice:null };
        const $ = id => document.getElementById(id);

        function showPage(p) { $('landingPage').classList.toggle('hidden', p !== $('landingPage')); $('catalogPage').classList.toggle('hidden', p !== $('catalogPage')); }
        
        function showToast(msg) { $('toastMsg').textContent = msg; $('toast').classList.remove('hidden'); setTimeout(() => $('toast').classList.add('hidden'), 3000); }
        
        function savePhones() { localStorage.setItem('freinzPhones', JSON.stringify(phones)); }
        function saveUserProfile() { localStorage.setItem('freinzUserProfile', JSON.stringify(userProfile)); }

        function renderStars(r) { 
            let stars = ''; 
            for(let i=0;i<5;i++) {
                stars += i<Math.floor(r) ? '<i class="fas fa-star star-filled"></i>' : 
                       (i===Math.floor(r)&&r%1>=0.5 ? '<i class="fas fa-star-half-alt star-filled"></i>' : 
                       '<i class="fas fa-star text-gray-600"></i>');
            }
            return stars;
        }

        function renderPhones(list = phones) {
            $('phoneGrid').innerHTML = '';
            if(list.length === 0) {
                $('emptyState').classList.remove('hidden');
                $('phoneGrid').classList.add('hidden');
                let msg = 'No phones found';
                if(activeFilters.maxPrice && activeFilters.maxPrice < 1000000) msg = 'Sayangnya Gaada Smartphone Yang Bagus Di Bawah 1 Jutaan';
                else if(activeFilters.minPrice && activeFilters.minPrice > 13000000) msg = 'Semua Yang Diatas Harga Segini Udah Termasuk Bagus Kok. Pilih Aja Sesuai Seleramu';
                $('emptyMsg').textContent = msg;
                return;
            }
            $('emptyState').classList.add('hidden');
            $('phoneGrid').classList.remove('hidden');
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'glass rounded-2xl overflow-hidden card-glow transition-all duration-300';
                card.innerHTML = `
                    <div class="relative h-40 md:h-48 overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover">
                        ${isAdmin ? `<button onclick="deletePhone(${p.id})" class="absolute top-2 right-2 w-9 h-9 rounded-full bg-red-500 hover:bg-red-600 flex items-center justify-center transition-colors" title="Delete"><i class="fas fa-trash text-sm"></i></button>` : ''}
                    </div>
                    <div class="p-4 md:p-5">
                        <h3 class="text-base md:text-lg font-bold mb-2 truncate">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-3">
                            <div class="flex text-xs md:text-sm">${renderStars(p.rating)}</div>
                            <span class="text-gray-400 text-xs md:text-sm">${p.rating.toFixed(1)}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xl md:text-2xl font-bold gradient-text">Rp ${p.price.toLocaleString('id-ID')}</span>
                        </div>
                    </div>`;
                $('phoneGrid').appendChild(card);
            });
        }

        function applyFilters() {
            let f = [...phones];
            const term = $('searchInput').value.toLowerCase();
            if(term) f = f.filter(p => p.name.toLowerCase().includes(term));
            if(activeFilters.ratings.length) f = f.filter(p => activeFilters.ratings.includes(Math.floor(p.rating)));
            if(activeFilters.minPrice || activeFilters.maxPrice) f = f.filter(p => p.price >= (activeFilters.minPrice||0) && p.price <= (activeFilters.maxPrice||Infinity));
            if(!currentUser || !isAdmin) f = f.filter(p => p.rating >= 4.5);
            renderPhones(f);
            updateFilterBadge();
        }

        function updateFilterBadge() {
            const count = activeFilters.ratings.length + (activeFilters.minPrice?1:0) + (activeFilters.maxPrice?1:0);
            $('filterBadge').classList.toggle('hidden', count === 0);
            $('filterBadge').textContent = count;
        }

        function updateUserUI(user) {
            if(user) {
                currentUser = user;
                const email = user.email?.toLowerCase() || '';
                isAdmin = ADMIN_EMAILS.some(e => e.toLowerCase() === email);
                const name = user.displayName || userProfile.username || user.email?.split('@')[0] || 'User';
                $('userAvatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=f97316&color=fff&bold=true`;
                $('userName').textContent = name;
                $('userSection').classList.remove('hidden');
                $('adminBtn').classList.toggle('hidden', !isAdmin);
            } else {
                currentUser = null;
                isAdmin = false;
                $('userSection').classList.add('hidden');
                $('adminBtn').classList.add('hidden');
            }
            applyFilters();
        }

        // Initial render
        renderPhones();

        // Auth state
        if(authAvailable) auth.onAuthStateChanged(user => { if(user) { updateUserUI(user); showPage($('catalogPage')); } });

        // Check if already logged in
        setTimeout(() => { 
            if(authAvailable && auth.currentUser) { 
                updateUserUI(auth.currentUser); 
                showPage($('catalogPage')); 
            } else {
                renderPhones(phones.filter(p => p.rating >= 4.5));
            }
        }, 500);

        // Event Listeners
        $('guestBtn').onclick = () => { currentUser = null; isAdmin = false; showPage($('catalogPage')); showToast('Guest view (4.5★+ only)'); applyFilters(); };
        $('homeBtn').onclick = () => { currentUser = null; showPage($('landingPage')); };

        // Login handlers
        $('loginGoogle').onclick = async () => { try { const r = await auth.signInWithPopup(googleProvider); updateUserUI(r.user); showPage($('catalogPage')); showToast('Welcome ' + (r.user.displayName || 'User') + '!'); } catch(e) { showToast(e.message || 'Login failed'); } };
        $('loginFacebook').onclick = async () => { try { const r = await auth.signInWithPopup(facebookProvider); updateUserUI(r.user); showPage($('catalogPage')); showToast('Welcome!'); } catch(e) { showToast(e.message || 'Login failed'); } };
        $('loginApple').onclick = async () => { try { const r = await auth.signInWithPopup(appleProvider); updateUserUI(r.user); showPage($('catalogPage')); showToast('Welcome!'); } catch(e) { showToast(e.message || 'Login failed'); } };

        // Profile modal
        $('profileBtn').onclick = () => { $('profileAvatar').src = $('userAvatar').src; $('profileEmail').textContent = currentUser?.email || ''; $('profileUsername').value = userProfile.username || currentUser?.displayName || ''; $('profileBio').value = userProfile.bio || ''; $('profileModal').classList.remove('hidden'); };
        $('closeProfileModal').onclick = () => $('profileModal').classList.add('hidden');
        $('saveProfile').onclick = () => { userProfile.username = $('profileUsername').value; userProfile.bio = $('profileBio').value; saveUserProfile(); updateUserUI(currentUser); $('profileModal').classList.add('hidden'); showToast('Profile saved!'); };
        $('profileModal').onclick = e => { if(e.target === $('profileModal')) $('profileModal').classList.add('hidden'); };

        // Logout modal
        $('logoutBtn').onclick = () => $('logoutModal').classListremove('hidden');
        $('cancelLogout').onclick = () => $('logoutModal').classList.add('hidden');
        $('confirmLogout').onclick = () => { $('logoutModal').classList.add('hidden'); if(auth.currentUser) auth.signOut(); updateUserUI(null); showPage($('landingPage')); showToast('Signed out'); };
        $('logoutModal').onclick = e => { if(e.target === $('logoutModal')) $('logoutModal').classList.add('hidden'); };

        // Filter modal
        let activeSort = 'termurah';
        console.log('Filter setup starting...');
        $('openFilterBtn').onclick = function() { 
            console.log('Filter clicked'); 
            $('filterModal').classList.remove('hidden'); 
        };
        $('closeFilterModal').onclick = function() { $('filterModal').classList.add('hidden'); };
        
        // Close when clicking outside
        $('filterModal').addEventListener('click', function(e) {
            if (e.target === $('filterModal')) {
                $('filterModal').classList.add('hidden');
            }
        });
        
        // Rating buttons
        document.querySelectorAll('.filter-rating').forEach(b => {
            b.onclick = () => { 
                const r = parseInt(b.dataset.rating);
                activeFilters.ratings = [r]; // Single select
                document.querySelectorAll('.filter-rating').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
            };
        });
        
        // Price buttons
        document.querySelectorAll('.price-btn').forEach(b => {
            b.onclick = () => {
                activeFilters.minPrice = parseInt(b.dataset.min);
                activeFilters.maxPrice = parseInt(b.dataset.max);
                document.querySelectorAll('.price-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
            };
        });
        
        // Sort buttons
        document.querySelectorAll('.sort-btn').forEach(b => {
            b.onclick = () => {
                activeSort = b.dataset.sort;
                document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
            };
        });
        
        $('resetFilter').onclick = () => { 
            activeFilters = { ratings:[], minPrice:null, maxPrice:null }; 
            activeSort = 'termurah';
            $('filterMinPrice').value = ''; 
            $('filterMaxPrice').value = ''; 
            document.querySelectorAll('.filter-rating, .price-btn').forEach(b => b.classList.remove('selected'));
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector('.sort-btn[data-sort="termurah"]').classList.add('selected');
        };
        
        $('applyFilter').onclick = () => { 
            activeFilters.minPrice = $('filterMinPrice').value ? parseInt($('filterMinPrice').value) : null;
            activeFilters.maxPrice = $('filterMaxPrice').value ? parseInt($('filterMaxPrice').value) : null;
            $('filterModal').classList.add('hidden'); 
            applyFilters(); 
            showToast('Filter applied');
        };

        // Override applyFilters to include sorting
        applyFilters = function() {
            let f = [...phones];
            const term = $('searchInput').value.toLowerCase();
            if(term) f = f.filter(p => p.name.toLowerCase().includes(term));
            if(activeFilters.ratings.length) f = f.filter(p => activeFilters.ratings.includes(Math.floor(p.rating)));
            if(activeFilters.minPrice || activeFilters.maxPrice) f = f.filter(p => p.price >= (activeFilters.minPrice||0) && p.price <= (activeFilters.maxPrice||Infinity));
            if(!currentUser || !isAdmin) f = f.filter(p => p.rating >= 4.5);
            
            if(activeSort === 'termurah') f.sort((a,b) => a.price - b.price);
            else if(activeSort === 'termahal') f.sort((a,b) => b.price - a.price);
            else if(activeSort === 'rating') f.sort((a,b) => b.rating - a.rating);
            
            updateFilterBadge();
            renderPhones(f);
        };

        // Add phone modal
        $('adminBtn').onclick = () => { $('addForm').reset(); base64Image = ''; $('imagePreview').classList.add('hidden'); $('imageDropzone').classList.remove('hidden'); $('addModal').classList.remove('hidden'); };
        $('closeAddModal').onclick = () => $('addModal').classList.add('hidden');
        $('addModal').onclick = e => { if(e.target === $('addModal')) $('addModal').classList.add('hidden'); };
        $('imageDropzone').onclick = () => $('phoneImage').click();
        $('phoneImage').onchange = e => { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onload = ev => { base64Image = ev.target.result; $('imagePreview').src = base64Image; $('imagePreview').classList.remove('hidden'); $('imageDropzone').classList.add('hidden'); }; r.readAsDataURL(f); } };
        $('addForm').onsubmit = e => { e.preventDefault(); const id = phones.length ? Math.max(...phones.map(p => p.id)) + 1 : 1; phones.push({ id, name: $('phoneName').value, price: parseFloat($('phonePrice').value), rating: parseFloat($('phoneRating').value), image: base64Image || 'https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=400&h=400&fit=crop' }); savePhones(); $('addModal').classList.add('hidden'); applyFilters(); showToast('Phone added!'); };

        // Search
        $('searchInput').oninput = applyFilters;

        // Delete function
        window.deletePhone = id => { phones = phones.filter(p => p.id !== id); savePhones(); applyFilters(); showToast('Phone deleted!'); };
    </script>
</body>
</html>
